name: Checks matrix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  version-matrix:
    strategy:
      fail-fast: false
      matrix:
        go-version: [ 1.24 ]
    uses: ./.github/workflows/checks.yml
    with:
      go-version: ${{ matrix.go-version }}
